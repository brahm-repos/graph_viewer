<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded TTL Graph Visualizer (iframe)</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        p { color: #555; line-height: 1.5; }
        .embed-wrap {
            margin-top: 20px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .embed-wrap iframe {
            display: block;
            width: 100%;
            height: 640px;
            border: none;
        }
    </style>
</head>
<body>
    <h1>TTL Graph Visualizer – iframe embed</h1>
    <p>
        The visualizer runs in the iframe below. When you serve this page from the same origin as the app,
        use <code>src="../"</code> so the iframe loads the app root. If the app is on another URL, set
        <code>src</code> to that URL (e.g. <code>https://your-host.com/kgv/</code>).
    </p>
    <div class="embed-wrap">
        <!-- Point to the app root. When served as /embedded-example/, ../ is the app root. -->
        <iframe
            src="../"
            title="TTL Graph Visualizer"
            width="100%"
            height="640"
       ></iframe>
    </div>
</body>
</html>
